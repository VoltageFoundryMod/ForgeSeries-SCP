; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = xiao_rp2040

[env]
build_flags = -std=gnu++17 -I lib

[env:xiao_rp2040]
framework = arduino
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2040
board_build.core = earlephilhower
monitor_speed = 115200
lib_deps =
	adafruit/Adafruit SSD1306@^2.5.16
	adafruit/Adafruit MCP4728@^1.0.10
	; fix_fft is vendored in lib/ (see lib/fixfft.*) so it builds identically on
	; hardware and in the VCV Rack plugin — no external FFT dependency.
build_flags =
	-std=gnu++17
	-I lib
	-O3
	-Wl,--gc-sections
	-DUSE_TINYUSB
	; Debug flags that can be enabled during development:
	; -DSCOPE_DEBUG

[env:native]
platform = native
test_framework = googletest
lib_deps =
	google/googletest@^1.12.1
	fabiobatsilva/ArduinoFake@^0.4.0
