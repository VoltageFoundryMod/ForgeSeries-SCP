<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="30.48mm" height="128.5mm" viewBox="0 0 30.48 128.5">
  <style>
    .lbl { font-family: 'Helvetica','Arial',sans-serif; font-size: 2.6px; fill: #c9d4dc; text-anchor: middle; }
    .sec { font-family: 'Helvetica','Arial',sans-serif; font-size: 2.2px; fill: #6f7c86; text-anchor: middle; letter-spacing: 0.3px; }
    .ttl { font-family: 'Helvetica','Arial',sans-serif; font-size: 4.6px; fill: #eaf2f7; text-anchor: middle; font-weight: bold; letter-spacing: 0.4px; }
    .brd { font-family: 'Helvetica','Arial',sans-serif; font-size: 1.9px; fill: #5aa9d6; text-anchor: middle; letter-spacing: 0.5px; }
  </style>

  <!-- Panel background -->
  <rect x="0" y="0" width="30.48" height="128.5" fill="#1b1d22"/>
  <rect x="0.15" y="0.15" width="30.18" height="128.2" fill="none" stroke="#000000" stroke-width="0.3"/>

  <!-- Title -->
  <text class="ttl" x="15.24" y="12.5">FORGE</text>
  <text class="ttl" x="15.24" y="17.2">VIEW</text>

  <!-- Display window frame (matches the FramebufferDisplay widget box) -->
  <rect x="1.6" y="19.1" width="27.3" height="16.4" rx="1.0" fill="#05070b" stroke="#3a4048" stroke-width="0.4"/>

  <!-- Encoder ring + hint -->
  <circle cx="14.924" cy="50.918" r="6.4" fill="none" stroke="#3a4048" stroke-width="0.4"/>
  <text class="sec" x="15.24" y="43.0">SCROLL / CLICK</text>

  <!-- Inputs section -->
  <text class="sec" x="15.24" y="59.0">INPUTS</text>
  <text class="lbl" x="14.989" y="62.2">CLK</text>
  <text class="lbl" x="7.153" y="76.2">CV1</text>
  <text class="lbl" x="22.647" y="76.2">CV2</text>

  <!-- Outputs section -->
  <text class="sec" x="15.24" y="90.4">THRU OUT</text>
  <text class="lbl" x="7.412" y="103.0">1</text>
  <text class="lbl" x="22.652" y="103.0">2</text>

  <!-- Brand footer -->
  <text class="brd" x="15.24" y="124.8">VOLTAGE FOUNDRY</text>
</svg>
